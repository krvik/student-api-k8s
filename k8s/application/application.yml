# ============================
# NODE LABELS (for documentation only)
# Run these manually:
# kubectl label nodes minikube app-role=app
# kubectl label nodes minikube-m02 app-role=db
# kubectl label nodes minikube-m03 app-role=others
# ============================


# =====================================================
# API DEPLOYMENT (runs on app node)
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: student-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      nodeSelector:
        app-role: app
      containers:
      - name: api-container
        image: vikashkumardev1996/rest_api_webserver:v2
        ports:
        - containerPort: 5000


---
# =====================================================
# API SERVICE
# =====================================================
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: student-api
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP


