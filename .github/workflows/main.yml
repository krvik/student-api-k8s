name: Self Hosted CI - Ex7.1

defaults:
  run:
    shell: bash

on:
  workflow_dispatch:

jobs:

  PRQ:
    name: Deployment on K8s
    runs-on: self-hosted


    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Debug – show current directory
        run: pwd

      - name: Debug – list files
        run: ls -la

      - name: Debug – list k8s folder
        run: ls -R k8s || echo "k8s folder not found"


  Crt-NSP:
    name: K8s namespace creation
    runs-on: self-hosted
    needs: PRQ

    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Create Namespace
        run: |
          kubectl apply -f k8s/namespace/
    
  Crt-Deployment:
    name: Executing kubernetes manifests
    runs-on: self-hosted
    needs: Crt-NSP

    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Create other reseources and deployments
        run: |
          kubectl apply -f k8s/application/
